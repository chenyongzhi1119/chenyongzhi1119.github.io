# --------------------------------------
# Hexo Butterfly Theme Configuration
# --------------------------------------

# --------------------------------------
# Navigation Settings
# --------------------------------------

nav:
  logo:
  display_title: true
  display_post_title: true
  fixed: false

menu:
  Home: / || fas fa-home
  Archives: /archives/ || fas fa-archive
  Categories: /categories/ || fas fa-folder-open
  Tags: /tags/ || fas fa-tags

# --------------------------------------
# Code Blocks Settings
# --------------------------------------

code_blocks:
  theme: pale night
  macStyle: true
  height_limit: false
  word_wrap: false
  copy: true
  language: true
  shrink: false
  fullpage: false

# Social media links
social:
  fab fa-github: https://github.com/chenyongzhi1119 || Github || '#24292e'

# --------------------------------------
# Image Settings
# --------------------------------------

favicon: /img/favicon.png

avatar:
  img: /img/butterfly-icon.png
  effect: false

disable_top_img: false

default_top_img:

index_img:

archive_img:

tag_img:

tag_per_img:

category_img:

category_per_img:

footer_img: false

background:

cover:
  index_enable: true
  aside_enable: true
  archives_enable: true
  default_cover:

error_img:
  flink: /img/friend_404.gif
  post_page: /img/404.jpg

error_404:
  enable: false
  subtitle: 'Page Not Found'
  background: /img/error-page.png

post_meta:
  page:
    date_type: created
    date_format: date
    categories: true
    tags: false
    label: true
  post:
    position: left
    date_type: both
    date_format: date
    categories: true
    tags: true
    label: true

# --------------------------------------
# Index page settings
# --------------------------------------

index_site_info_top:
index_top_img_height:

# 首页副标题：打字机效果
subtitle:
  enable: true
  effect: true
  typed_option:
  source: false
  sub:
    - 在校研究生 | 热爱编程与算法
    - Keep learning, keep building.
    - 分享技术，记录成长

index_layout: 3

index_post_content:
  method: 2
  length: 500

# --------------------------------------
# Post Settings
# --------------------------------------

# 悬浮目录，带层级
toc:
  post: true
  page: false
  number: true
  expand: true
  style_simple: false
  scroll_percent: true

post_copyright:
  enable: true
  decode: false
  author_href: https://github.com/chenyongzhi1119
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

reward:
  enable: false
  text:
  QR_code:

post_edit:
  enable: false
  url:

related_post:
  enable: true
  limit: 6
  date_type: created

post_pagination: 1

noticeOutdate:
  enable: false
  style: flat
  limit_day: 365
  position: top
  message_prev: It has been
  message_next: days since the last update, the content of the article may be outdated.

# --------------------------------------
# Footer Settings
# --------------------------------------
footer:
  nav:
  owner:
    enable: true
    since: 2025
  copyright:
    enable: true
    version: true
  custom_text:

# --------------------------------------
# Aside Settings（侧边栏）
# --------------------------------------

aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  display:
    archive: true
    tag: true
    category: true
  card_author:
    enable: true
    description: 在校研究生 | 热爱编程与算法
    button:
      enable: true
      icon: fab fa-github
      text: GitHub
      link: https://github.com/chenyongzhi1119
  card_announcement:
    enable: true
    content: 欢迎来到我的博客 👋
  card_recent_post:
    enable: true
    limit: 5
    sort: date
    sort_order:
  card_newest_comments:
    enable: false
    sort_order:
    limit: 6
    storage: 10
    avatar: true
  card_categories:
    enable: true
    limit: 8
    expand: none
    sort_order:
  card_tags:
    enable: true
    limit: 40
    color: true
    custom_colors:
    orderby: random
    order: 1
    sort_order:
  card_archives:
    enable: true
    type: monthly
    format: MMMM YYYY
    order: -1
    limit: 8
    sort_order:
  card_post_series:
    enable: true
    series_title: false
    orderBy: 'date'
    order: -1
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true
    sort_order:
    runtime_date:

# --------------------------------------
# Bottom right button
# --------------------------------------

rightside_bottom:

translate:
  enable: false
  default: 繁
  defaultEncoding: 2
  translateDelay: 0
  msgToTraditionalChinese: '繁'
  msgToSimplifiedChinese: '簡'

readmode: true

# 暗黑模式：自动跟随系统
darkmode:
  enable: true
  button: true
  autoChangeMode: 1
  start:
  end:

rightside_scroll_percent: true

rightside_item_order:
  enable: false
  hide:
  show:

rightside_config_animation: true

# --------------------------------------
# Global Settings
# --------------------------------------

anchor:
  auto_update: false
  click_to_scroll: false

photofigcaption: false

copy:
  enable: true
  copyright:
    enable: false
    limit_count: 150

wordcount:
  enable: false
  post_wordcount: true
  min2read: true
  total_wordcount: true

busuanzi:
  site_uv: true
  site_pv: true
  page_pv: true

# --------------------------------------
# Math
# --------------------------------------

math:
  use:
  per_page: true
  hide_scrollbar: false

  mathjax:
    enableMenu: true
    tags: none

  katex:
    copy_tex: false

# --------------------------------------
# 本地全文搜索
# --------------------------------------

search:
  use: local_search
  placeholder: 搜索文章...

  algolia_search:
    hitsPerPage: 6

  local_search:
    preload: false
    top_n_per_article: 1
    unescape: false
    pagination:
      enable: false
      hitsPerPage: 8
    CDN:

  docsearch:
    appId:
    apiKey:
    indexName:
    option:

# --------------------------------------
# Share System
# --------------------------------------

share:
  use: sharejs
  sharejs:
    sites: facebook,x,wechat,weibo,qq
  addtoany:
    item: facebook,x,wechat,sina_weibo,facebook_messenger,email,copy_link

